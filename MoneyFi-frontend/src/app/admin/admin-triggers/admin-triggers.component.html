<div class="container">

    <h2>Trigger Schedules</h2>

    <div class="batch-row" *ngFor="let batch of batches">

        <button (click)="triggerBatch(batch.type, batch.recipientType, batch.username)" [disabled]="loading">

            Trigger {{ batch.label }} Batch
        </button>

        <select [(ngModel)]="batch.recipientType">
            <option value="ALL">All Users</option>
            <option value="SPECIFIC">Specific</option>
        </select>

        <div class="autocomplete-container">

            <input type="text" placeholder="Enter username" [disabled]="batch.recipientType !== 'SPECIFIC'"
                [(ngModel)]="batch.username" (input)="searchUsers(batch)" (focus)="onFocus(batch)"
                (blur)="onBlur(batch)" />


            <div class="suggestions" *ngIf="batch.showSuggestions">


                <div class="suggestion" *ngFor="let user of batch.suggestions" (mousedown)="selectUser(batch,user)">



                    {{user}}


                </div>


            </div>


        </div>

    </div>

    <p class="message" *ngIf="message">
        {{ message }}
    </p>

</div>
