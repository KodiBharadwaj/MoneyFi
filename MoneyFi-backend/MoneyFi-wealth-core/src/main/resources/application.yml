spring:
  profiles:
    active: ${PROFILE:sqlserver}
  application:
    name:
      MoneyFi-wealth-core

  boot:
    admin:
      client:
        url: ${MONITOR_SERVICE_URL}
        username: admin        # <-- must match monitor server
        password: admin123     # <-- must match monitor server
        instance:
          metadata:
            user.name: client
            user.password: client123

  data:
    redis:
      url: ${REDIS_URL}
      timeout: 5s
  cache:
    type: redis
    redis:
      time-to-live: 3600000

  management:
    endpoints:
      web:
        exposure:
          include: "*"
    endpoint:
      health:
        show-details: always


logging:
  level:
    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF

  jackson:
    time-zone: Asia/Kolkata

