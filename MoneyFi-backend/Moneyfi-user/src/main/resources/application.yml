spring:
  application:
    name: MoneyFi-user
  profiles:
    active: ${PROFILE:local}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
          facebook:
            client-id: xxxxxxxxxxxxxxxxxx
            client-secret: xxxxxxxxxxxxxxxxxxxxxxxxxx
            redirect-uri: "xxxxxxxxxxxxxxxxxxxxx"

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  #Redis Configuration
  data:
    redis:
      url: ${REDIS_URL}
      timeout: 5s
  cache:
    type: redis
    redis:
      time-to-live: 3600000

jwt:
  secret: ekhfjulewfsuydg342fhdarewugafhs69aufg7efesdaf

cors:
  allowed-origins: ${ALLOWED_ORIGINS}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}
  instance:
    prefer-ip-address: true


  jackson:
    time-zone: Asia/Kolkata

logging:
  level:
    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF

server:
  port: 8500

springdoc:
  api-docs:
    enabled: true
    server-url: /
  swagger-ui:
    enabled: true
